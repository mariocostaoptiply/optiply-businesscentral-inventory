name: AL-Go CI/CD

on:
  workflow_dispatch:
  push:
    branches: ["main", "master", "release/*", "feature/*"]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: ["main", "master"]

permissions:
  actions: read
  contents: write
  id-token: write
  packages: read
  security-events: write

jobs:
  build:
    name: Build AL app with AL-Go
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read AL-Go settings
        uses: microsoft/AL-Go-Actions/ReadSettings@main
        with:
          shell: powershell
          project: .

      - name: Determine Business Central artifact
        uses: microsoft/AL-Go-Actions/DetermineArtifactUrl@main
        with:
          shell: powershell
          project: .

      - name: Build AL app
        uses: microsoft/AL-Go-Actions/RunPipeline@main
        with:
          shell: powershell
          project: .
          artifact: ${{ env.artifact }}

      - name: Collect app packages
        if: always()
        run: |
          New-Item -ItemType Directory -Force -Path app-packages | Out-Null
          Get-ChildItem -Path .buildartifacts\Apps, .output -Filter *.app -ErrorAction SilentlyContinue |
            Copy-Item -Destination app-packages -Force
          Get-ChildItem -Path app-packages -Filter *.app | ForEach-Object { Write-Host "Collected $($_.FullName)" }

      - name: Upload compiled app packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-packages
          path: |
            app-packages/*.app
            BuildOutput.txt
            ContainerEventLog.evtx
          if-no-files-found: warn

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app-packages/*.app
