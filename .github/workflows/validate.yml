name: Validate AL Extension

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install BcContainerHelper
        shell: pwsh
        run: Install-Module BcContainerHelper -Force -Scope CurrentUser

      - name: Run AL Validation
        shell: pwsh
        run: |
          Run-AlValidation `
            -apps @("app/*.app") `
            -validateCurrent `
            -countries @("gb","w1") `
            -affixes @("hot") `
            -supportedCountries @("gb","w1")