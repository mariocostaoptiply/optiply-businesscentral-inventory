name: Release AL Extension

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install BcContainerHelper
        shell: pwsh
        run: Install-Module BcContainerHelper -Force -Scope CurrentUser

      - name: Build App Package
        shell: pwsh
        run: |
          New-BcContainer -accept_eula `
            -accept_outdated `
            -containerName "release" `
            -imageName "mcr.microsoft.com/businesscentral/sandbox:ltsc2022" `
            -auth NavUserPassword `
            -updateHosts

          Compile-AppInBCContainer `
            -containerName release `
            -appProjectFolder "$PWD/app"

          Copy-BcContainerArtifact `
            -containerName release `
            -artifactPath "$PWD/output"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: output/*.app
